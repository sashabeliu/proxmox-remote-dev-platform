- hosts: dev
  become: yes
  roles:
    - tailscale
    - common
    - docker
    - storage_client
    - git_ssh
    - github_deploy_key
    - git_workspace
    - code_server
    - project_bringup

- hosts: gpu_dev
  become: yes
