- name: Read generated Git public key
  ansible.builtin.slurp:
    src: "/home/{{ docker_user }}/.ssh/git_ed25519.pub"
  register: git_pubkey_raw

- name: Set decoded Git public key fact
  ansible.builtin.set_fact:
    git_pubkey: "{{ git_pubkey_raw.content | b64decode | trim }}"

- name: Get existing deploy keys from GitHub
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ item.github_owner }}/{{ item.github_repo }}/keys"
    method: GET
    headers:
      Accept: "application/vnd.github+json"
      Authorization: "Bearer {{ lookup('env', 'GITHUB_TOKEN') }}"
      X-GitHub-Api-Version: "2022-11-28"
    return_content: true
    status_code: 200
  loop: "{{ dev_projects }}"
  register: github_existing_keys

- name: Show whether current VM key already exists in GitHub
  ansible.builtin.debug:
    msg:
      - "Current VM key: {{ git_pubkey }}"
      - "Existing GitHub keys: {{ item.1.json | map(attribute='key') | list }}"
      - "Will create: {{ git_pubkey not in (item.1.json | map(attribute='key') | list) }}"
  loop: "{{ dev_projects | zip(github_existing_keys.results) | list }}"
  loop_control:
    label: "{{ item.0.github_owner }}/{{ item.0.github_repo }}"

- name: Add deploy key to GitHub if missing
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ item.0.github_owner }}/{{ item.0.github_repo }}/keys"
    method: POST
    headers:
      Accept: "application/vnd.github+json"
      Authorization: "Bearer {{ lookup('env', 'GITHUB_TOKEN') }}"
      X-GitHub-Api-Version: "2022-11-28"
    body_format: json
    body:
      title: "{{ inventory_hostname }}-git"
      key: "{{ git_pubkey }}"
      read_only: false
    status_code:
      - 201
      - 422
  loop: "{{ dev_projects | zip(github_existing_keys.results) | list }}"
  loop_control:
    label: "{{ item.0.github_owner }}/{{ item.0.github_repo }}"
  when: git_pubkey not in (item.1.json | map(attribute='key') | list)
