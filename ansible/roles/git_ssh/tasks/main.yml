- name: Ensure .ssh directory exists for git user
  ansible.builtin.file:
    path: "/home/{{ docker_user }}/.ssh"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0700"

- name: Generate Git SSH key if missing
  become: yes
  become_user: "{{ docker_user }}"
  community.crypto.openssh_keypair:
    path: "/home/{{ docker_user }}/.ssh/git_ed25519"
    type: ed25519
    comment: "{{ inventory_hostname }}-git"
    mode: "0600"

- name: Ensure GitHub host key is known
  become: yes
  become_user: "{{ docker_user }}"
  ansible.builtin.known_hosts:
    path: "/home/{{ docker_user }}/.ssh/known_hosts"
    name: github.com
    key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 github.com 2>/dev/null') }}"

- name: Configure SSH to use git_ed25519 for GitHub
  ansible.builtin.copy:
    dest: "/home/{{ docker_user }}/.ssh/config"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0600"
    content: |
      Host github.com
          HostName github.com
          User git
          IdentityFile /home/{{ docker_user }}/.ssh/git_ed25519
          IdentitiesOnly yes

- name: Read generated Git public key
  ansible.builtin.slurp:
    src: "/home/{{ docker_user }}/.ssh/git_ed25519.pub"
  register: git_pubkey_raw

- name: Show Git public key for GitHub registration
  ansible.builtin.debug:
    msg: "{{ git_pubkey_raw.content | b64decode }}"
