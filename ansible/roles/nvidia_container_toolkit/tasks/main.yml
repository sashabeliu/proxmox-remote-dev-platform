- name: Ensure keyrings directory exists
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    mode: "0755"

- name: Download NVIDIA container toolkit GPG key
  ansible.builtin.shell: |
    curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | \
    gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
  args:
    creates: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg

- name: Add NVIDIA container toolkit repository
  ansible.builtin.shell: |
    curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
    sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' \
    > /etc/apt/sources.list.d/nvidia-container-toolkit.list
  args:
    creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes

- name: Install NVIDIA container toolkit
  ansible.builtin.apt:
    name: nvidia-container-toolkit
    state: present

- name: Configure NVIDIA runtime for Docker
  ansible.builtin.command: nvidia-ctk runtime configure --runtime=docker
  register: nvidia_ctk_result
  changed_when: "'Wrote updated config' in nvidia_ctk_result.stdout or nvidia_ctk_result.rc == 0"

- name: Restart Docker
  ansible.builtin.service:
    name: docker
    state: restarted

- name: Validate NVIDIA driver in guest
  ansible.builtin.command: nvidia-smi
  register: nvidia_smi_host
  changed_when: false

- name: Validate NVIDIA GPU inside Docker
  ansible.builtin.command: docker run --rm --gpus all nvidia/cuda:12.9.0-base-ubuntu22.04 nvidia-smi
  register: nvidia_smi_docker
  changed_when: false
